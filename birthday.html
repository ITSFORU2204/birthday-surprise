<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<style>
    body {
        text-align: center;
        font-family: Arial;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        margin-top: 100px;
    }
    h1 {
        color: #333;
    }
    button {
        padding: 10px 20px;
        font-size: 18px;
        margin: 10px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
    }
    #noBtn {
        position: absolute;
    }
</style>
</head>

<body>

<h1>🎉 Today is your special day 🎉</h1>
<p>Will you accept this birthday wish?</p>

<button onclick="showMessage()">Yes 😊</button>
<button id="noBtn" onmouseover="moveButton()">No 😜</button>

<script>
function showMessage() {
    document.body.innerHTML = "<h1>🎂 Happy Birthday 😊</h1><p>Someone wishes you happiness always 💖</p>";
}

function moveButton() {
    var btn = document.getElementById("noBtn");
    btn.style.top = Math.random() * window.innerHeight + "px";
    btn.style.left = Math.random() * window.innerWidth + "px";
}
</script>

</body>
</html>
